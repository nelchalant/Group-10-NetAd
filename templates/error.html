<!DOCTYPE html>
<html>
<head>
    <title>Error – CCTV Web App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .error-code { font-size: 48px; font-weight: bold; color: #dc3545; }
        .error-message { font-size: 24px; margin: 20px 0; }
        .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">{{ code }}</div>
        <div class="error-message">{{ message }}</div>
        <a href="/" class="btn">Return to Home</a>
    </div>
</body>
</html>
